server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Todas as requisições que não forem arquivos serão direcionadas ao index.html
    # Isso garante que aplicativos SPA (como React/Vite) funcionem ao atualizar a página
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache opcional para recursos estáticos (aumenta o desempenho e poupa banda do seu VPS)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15778463";
    }
}
